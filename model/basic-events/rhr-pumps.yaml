basic_events:

  BE-RHR-PMP-A-FTS:
    label: "RHR pump A fails to start on demand"
    system: RHR
    component: PMP-A
    failure_mode: FTS
    failure_model:
      type: probability
      value: {value: 1.2e-3, unit: per_demand}
    provenance:
      source: "NUREG/CR-6928, 2020 update, MDP standby FTS"
      justification: "Generic value; same class as ECCS pumps."

  BE-RHR-PMP-A-FTR:
    label: "RHR pump A fails to run (24 h mission)"
    system: RHR
    component: PMP-A
    failure_mode: FTR
    failure_model:
      type: rate-mission
      rate: {value: 3.0e-5, unit: per_hour}
      mission_time: {param: PAR-MISSION-TIME-24H}
    provenance:
      source: "NUREG/CR-6928, 2020 update, MDP standby FTR"
      justification: "Generic value; same class as ECCS pumps."

  BE-RHR-PMP-B-FTS:
    label: "RHR pump B fails to start on demand"
    system: RHR
    component: PMP-B
    failure_mode: FTS
    failure_model:
      type: probability
      value: {value: 1.2e-3, unit: per_demand}
    provenance:
      source: "NUREG/CR-6928, 2020 update, MDP standby FTS"
      justification: "Generic value; same class as ECCS pumps."

  BE-RHR-PMP-B-FTR:
    label: "RHR pump B fails to run (24 h mission)"
    system: RHR
    component: PMP-B
    failure_mode: FTR
    failure_model:
      type: rate-mission
      rate: {value: 3.0e-5, unit: per_hour}
      mission_time: {param: PAR-MISSION-TIME-24H}
    provenance:
      source: "NUREG/CR-6928, 2020 update, MDP standby FTR"
      justification: "Generic value; same class as ECCS pumps."
